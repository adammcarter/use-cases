schema_version: 1
capsule_id: capsule.v1.release_smoke
title: v1 release smoke showcase
mode: showcase
description: Perform a command-backed smoke demo of the use-case-matrix plugin itself.
audience: reviewer
timebox_seconds: 300
items:
  - use_case_id: capsule.live_runner.scripted
    scenario_ids: [capsule.live_runner.scripted.cli]
    runbook:
      - kind: instruction
        text: Run the v1 release smoke command through the capsule runner.
      - kind: command
        executable: node
        argv:
          - -e
          - "require('node:fs').accessSync('use-case-matrix.yml'); process.stdout.write('use-case-matrix workspace smoke\\n');"
        working_directory: .
        expected_exit_codes: [0]
permissions:
  command_execution: true
extensions:
  use-case-matrix.dev/runner:
    command: uc capsule run --repo . --capsule capsule.v1.release_smoke --execute-commands --idempotency-key p14:v1-release-smoke --json
    command_steps: required
