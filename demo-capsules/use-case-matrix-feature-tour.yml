schema_version: 1
capsule_id: capsule.presentation_skills.feature_tour
title: Presentation Skills feature tour
mode: showcase
description: Perform a high-level showcase of the product-level Presentation Skills matrix, proof model, live showcase flow, MCP boundary, host truthfulness, release dogfood loop, diagnostics and schema contract surface, skill-asset validation, crash-durable ledger writes, host smoke resilience, and matrix health summary.
audience: reviewer
timebox_seconds: 3600
items:
  - use_case_id: presentation_skills.matrix.product_inventory
    scenario_ids: [presentation_skills.matrix.product_inventory.cli]
    runbook:
      - kind: instruction
        text: Show that the repo has product-level presentation_skills rows, not only primitive mechanics.
      - kind: observation
        text: Matrix list includes product rows grouped by lifecycle, matrix, evidence, planning, showcase, capsules, MCP, hosts, migration, and release.
  - use_case_id: presentation_skills.planning.showcase_selection
    scenario_ids: [presentation_skills.planning.showcase_selection.cli]
    runbook:
      - kind: instruction
        text: Generate a showcase plan and explain selected rows, reasons, exclusions, and evidence gaps.
      - kind: observation
        text: The plan is prepared_not_performed and favors high-value golden product rows.
  - use_case_id: presentation_skills.evidence.product_proof_map
    scenario_ids: [presentation_skills.evidence.product_proof_map.record]
    runbook:
      - kind: instruction
        text: Show evidence status and explain how evidence IDs map back to stable use-case IDs and semantic hashes.
      - kind: observation
        text: Evidence is append-only proof data and does not become approval or instruction.
  - use_case_id: presentation_skills.showcase.live_acceptance_flow
    scenario_ids: [presentation_skills.showcase.live_acceptance_flow.cli]
    runbook:
      - kind: instruction
        text: Start or inspect a showcase run and show observation, verdict, finish, and status replay events.
      - kind: observation
        text: The run status is derived from events and remains separate from user approval.
  - use_case_id: presentation_skills.showcase.status_separation
    scenario_ids: [presentation_skills.showcase.status_separation.status]
    runbook:
      - kind: instruction
        text: Show verdict, verification, completion, and approval as separate status dimensions.
      - kind: observation
        text: A run can be performed, incomplete, blocked, or unapproved without collapsing those states.
  - use_case_id: presentation_skills.mcp.cli_contract_transport
    scenario_ids: [presentation_skills.mcp.cli_contract_transport.parity]
    runbook:
      - kind: instruction
        text: Compare CLI and MCP contract semantics for a read command.
      - kind: observation
        text: MCP wraps the CLI/core contract rather than reimplementing product logic.
  - use_case_id: presentation_skills.mcp.approval_request_only
    scenario_ids: [presentation_skills.mcp.approval_request_only.boundary]
    runbook:
      - kind: instruction
        text: Show that MCP can request a trusted approval path but cannot write user approval.
      - kind: observation
        text: User approval requires a trusted user confirmation path outside model-controlled MCP writes.
  - use_case_id: presentation_skills.hosts.conformance_status_truth
    scenario_ids: [presentation_skills.hosts.conformance_status_truth.status]
    runbook:
      - kind: instruction
        text: Show host conformance status and distinguish passed, failed, not_run, static conformance, and live support proof.
      - kind: observation
        text: Host profile existence is not overstated as verified live host support.
  - use_case_id: presentation_skills.release.installable_artifact_provenance
    scenario_ids: [presentation_skills.release.installable_artifact_provenance.doctor]
    runbook:
      - kind: instruction
        text: Show package doctor or artifact inspection proof for the installable package, not only the checkout.
      - kind: observation
        text: Release proof is bound to packaged files and runtime entrypoints.
  - use_case_id: presentation_skills.release.self_dogfood_evidence_bundle
    scenario_ids: [presentation_skills.release.self_dogfood_evidence_bundle.bundle]
    runbook:
      - kind: instruction
        text: Summarize how this repo uses its own matrix, evidence, and showcase run as release proof for the demonstrated scope.
      - kind: observation
        text: The dogfood bundle shows demonstrated scope, evidence gaps, and any user sign-off still required.
  - use_case_id: presentation_skills.diagnostics.root_resolution
    scenario_ids: [presentation_skills.diagnostics.root_resolution.doctor]
    runbook:
      - kind: instruction
        text: Run doctor roots and show the workspace root and data root resolving distinctly, including a separated data root.
      - kind: observation
        text: Roots resolve deterministically and unsafe or symlinked roots are rejected.
  - use_case_id: presentation_skills.diagnostics.schema_contract_surface
    scenario_ids: [presentation_skills.diagnostics.schema_contract_surface.validate]
    runbook:
      - kind: instruction
        text: Run schema list and schema validate-fixtures to show the published, versioned contract surface.
      - kind: observation
        text: Every result envelope is backed by a versioned schema and the fixtures validate against it.
  - use_case_id: presentation_skills.skills.asset_validation
    scenario_ids: [presentation_skills.skills.asset_validation.doctor]
    runbook:
      - kind: instruction
        text: Run doctor skills and show the shipped showcase, walkthrough, and use-case-matrix skills validating with intact assets.
      - kind: observation
        text: Each shipped skill is discovered with a stable name and required files present.
  - use_case_id: presentation_skills.skills.degraded_assets
    scenario_ids: [presentation_skills.skills.degraded_assets.report]
    runbook:
      - kind: instruction
        text: Show how a skill missing required assets is reported as a diagnostic rather than passing silently.
      - kind: observation
        text: A damaged skill is visible and does not hide the status of healthy skills.
  - use_case_id: presentation_skills.evidence.crash_durable_ledger_writes
    scenario_ids: [presentation_skills.evidence.crash_durable_ledger_writes.atomic]
    runbook:
      - kind: instruction
        text: Explain how evidence and showcase appends use an atomic temp-file write with best-effort fsync.
      - kind: observation
        text: An interrupted append leaves the ledger whole, and unsupported temp fsync degrades to best-effort instead of failing.
  - use_case_id: presentation_skills.hosts.smoke_signal_resilience
    scenario_ids: [presentation_skills.hosts.smoke_signal_resilience.terminated]
    runbook:
      - kind: instruction
        text: Show that a host smoke executable killed by a signal is reported as not_run, never as passed.
      - kind: observation
        text: Abnormal termination is treated as inconclusive with a visible reason, not as proof of support.
  - use_case_id: presentation_skills.matrix.status_summary
    scenario_ids: [presentation_skills.matrix.status_summary.report]
    runbook:
      - kind: instruction
        text: Run matrix status to show row counts, integrity state, and evidence coverage in one read-only command.
      - kind: observation
        text: Matrix and evidence health are readable at a glance and derived from current files.
permissions:
  command_execution: false
extensions:
  use-case-matrix.dev/runner:
    command: ucm capsule run --repo . --capsule capsule.presentation_skills.feature_tour --idempotency-key self-matrix:feature-tour --json
    command_steps: none
