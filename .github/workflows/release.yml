name: release

# Publishes the single `use-case-matrix` package to npm with provenance using
# npm Trusted Publishing (OIDC). No NPM_TOKEN secret is used or required: npm
# mints a short-lived, workflow-scoped credential from the GitHub Actions
# `id-token`, so the credential cannot leak or be reused. The three workspace
# packages (core/cli/mcp) are private and ship bundled inside this one package —
# they are not published separately. See docs/release/publishing.md for the
# one-time owner setup on npmjs.com.
#
# The publish step uses the npm CLI (not `pnpm publish`): npm is the reference
# OIDC client, whereas pnpm 11 has an open trusted-publishing regression that
# 404s on OIDC publish (pnpm/pnpm#11513).

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC) AND for build provenance
  # attestations. This is the only credential the publish step needs.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted Publishing is tokenless but still repo-scoped: only run from the
    # canonical repository, never a fork.
    if: github.repository == 'adammcarter/use-case-matrix'
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships an npm that clears Trusted Publishing's floors
      # (npm >= 11.5.1, Node >= 22.14.0); upgrade npm to latest to be safe.
      # Corepack puts the repo-pinned pnpm on PATH for the build/test steps.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: corepack enable

      # pytest powers the pure-Python adoption example (examples/python-pytest);
      # tests/release/example-python-pytest.test.ts runs the REAL verifier, so
      # pytest must be on PATH for `pnpm -s test`. Mirror ci.yml — without this
      # the release job's test gate fails (pytest missing) and never publishes.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pytest

      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -s build
      - run: corepack pnpm -s test

      # Publish the single root `use-case-matrix` package via the npm CLI so the
      # OIDC trusted-publishing exchange and provenance attestation both work.
      # The root manifest's `files` list ships the built core/cli/mcp dist, so
      # the bundle is self-contained. `--provenance` is implied by Trusted
      # Publishing but set explicitly for clarity.
      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: "true"
