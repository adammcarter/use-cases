name: release

# Publishes the single `use-cases` package to npm with provenance using
# npm Trusted Publishing (OIDC). No NPM_TOKEN secret is used or required: npm
# mints a short-lived, workflow-scoped credential from the GitHub Actions
# `id-token`, so the credential cannot leak or be reused. The three workspace
# packages (core/cli/mcp) are private and ship bundled inside this one package —
# they are not published separately. See docs/release/publishing.md for the
# one-time owner setup on npmjs.com.
#
# The publish step uses the npm CLI (not `pnpm publish`): npm is the reference
# OIDC client, whereas pnpm 11 has an open trusted-publishing regression that
# 404s on OIDC publish (pnpm/pnpm#11513).

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  # `write` so the workflow can auto-create the GitHub Release on tag.
  contents: write
  # Required for npm Trusted Publishing (OIDC) AND for build provenance
  # attestations. This is the credential the publish step needs.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted Publishing is tokenless but still repo-scoped: only run from the
    # canonical repository, never a fork.
    if: github.repository == 'adammcarter/use-cases'
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships an npm that clears Trusted Publishing's floors
      # (npm >= 11.5.1, Node >= 22.14.0); upgrade npm to latest to be safe.
      # Corepack puts the repo-pinned pnpm on PATH for the build/test steps.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: corepack enable

      # pytest powers the pure-Python adoption example (examples/python-pytest);
      # tests/release/example-python-pytest.test.ts runs the REAL verifier, so
      # pytest must be on PATH for `pnpm -s test`. Mirror ci.yml — without this
      # the release job's test gate fails (pytest missing) and never publishes.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pytest

      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -s build
      - run: corepack pnpm -s test

      # Publish the single root `use-cases` package via the npm CLI so the
      # OIDC trusted-publishing exchange and provenance attestation both work.
      # The root manifest's `files` list ships the built core/cli/mcp dist, so
      # the bundle is self-contained. `--provenance` is implied by Trusted
      # Publishing but set explicitly for clarity.
      #
      # dist-tag is derived from the version: only a true PRERELEASE (a version
      # containing a hyphen, e.g. 1.0.0-rc.1) publishes under `beta`; every normal
      # release — including the pre-1.0 `0.0.x` beta line, which is the active
      # release line — publishes under `latest` so `npm i use-cases` always
      # resolves the newest release.
      - name: Publish to npm (Trusted Publishing + provenance)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Idempotent: if this version is already on npm (e.g. a tag pushed for a
          # historical or manually-published version), skip publish so the run
          # stays green instead of 403-ing on an immutable version.
          if npm view "@adammcarter/use-cases@$VERSION" version >/dev/null 2>&1; then
            echo "@adammcarter/use-cases@$VERSION already published — skipping npm publish."
            exit 0
          fi
          case "$VERSION" in
            *-*) TAG=beta ;;
            *) TAG=latest ;;
          esac
          echo "Publishing @adammcarter/use-cases@$VERSION under dist-tag: $TAG"
          npm publish --provenance --access public --tag "$TAG"
        env:
          NPM_CONFIG_PROVENANCE: "true"

      # Auto-create the GitHub Release for the pushed tag (no more manual
      # `gh release create`). Pre-1.0 (v0.*) and any hyphenated prerelease are
      # flagged as a GitHub pre-release; stable >=1.0.0 as a full release. Notes
      # are generated from the commits since the previous tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-') }}
