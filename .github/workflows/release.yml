name: release

# Publishes @use-case-matrix/{core,cli,mcp} to npm with provenance using npm
# Trusted Publishing (OIDC). No NPM_TOKEN secret is used or required: npm mints a
# short-lived, workflow-scoped credential from the `id-token` OIDC token. See
# docs/release/publishing.md for the one-time owner setup on npmjs.com.

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC) AND for build provenance
  # attestations. This is the only credential the publish step needs.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted Publishing is tokenless but still repo-scoped: only run from the
    # canonical repository, never a fork.
    if: github.repository == 'adammcarter/use-case-matrix'
    steps:
      - uses: actions/checkout@v4

      # Node first, then Corepack (so pnpm is on PATH), then re-run setup-node
      # with the npm registry + cache. setup-node's `cache: pnpm` shells out to
      # pnpm to resolve the store path, so pnpm must exist before the cache step.
      # Node 22 + the bundled npm satisfy Trusted Publishing's floors
      # (npm >= 11.5.1, Node >= 22.14.0).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -s build
      - run: corepack pnpm -s test

      # Publish all three packages together. `-r` recurses over the workspace and
      # skips the private root. `--provenance` attaches the build attestation;
      # `--access public` keeps the scoped packages public. `--no-git-checks`
      # because the tag commit is already the source of truth.
      - name: Publish to npm (Trusted Publishing + provenance)
        run: corepack pnpm -r publish --access public --provenance --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"
