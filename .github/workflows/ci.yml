name: ci

on:
  push:
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node first, then enable Corepack so pnpm is on PATH, then re-run
      # setup-node with cache. setup-node's `cache: pnpm` shells out to pnpm to
      # resolve the store path, so pnpm must exist before the cache step runs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      # pytest powers the pure-Python adoption example
      # (examples/python-pytest); tests/release/example-python-pytest.test.ts runs
      # the REAL verifier, so pytest must be on PATH for the suite.
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pytest
      - run: node scripts/release-gate.mjs
