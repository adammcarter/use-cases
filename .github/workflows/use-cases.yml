name: use-cases

# CI is authority (spec 10.2). validate-ledger + scan run on every push/PR; the
# policy mode (feature vs release) is selected from the branch / a manual input,
# reusing scan's --policy-mode. The optional prove job mints signed proof events
# on the release branch from the trusted CI signing key held in a secret.

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  workflow_dispatch:
    inputs:
      policy_mode:
        description: "Policy mode for the scan gate (feature | release)."
        required: false
        default: "feature"

# Release policy applies on the release branch(es) or when explicitly requested;
# every other ref is gated as a feature branch (block INVALID only).
env:
  UCM_EVIDENCE: .use-cases/evidence.jsonl
  UCM_BINDINGS: .use-cases/bindings.jsonl
  UCM_PUBLIC_KEY: .use-cases/trusted-ci-public-key.pem
  # Transient, per-run unsigned verification results (verify -> prove handoff).
  # Never committed -- gitignored; only the signed EVIDENCE ledger persists.
  UCM_VERIFICATION_RESULTS: .use-cases/verification-results.jsonl

jobs:
  policy:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.select.outputs.mode }}
    steps:
      - id: select
        run: |
          mode="feature"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.policy_mode }}" ]; then
            mode="${{ github.event.inputs.policy_mode }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            mode="release"
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Selected policy mode: $mode"

  validate-ledger:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Node, then Corepack (puts pnpm on PATH), then setup-node again with
      # cache -- `cache: pnpm` invokes pnpm to find the store, so pnpm must
      # exist before the cache step runs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      # Authority gate: append-only discipline, schemas, signatures, internal
      # hash consistency. Blocks the build on any failure (exit 4).
      - name: validate-ledger
        run: |
          key_args=()
          if [ -f "$UCM_PUBLIC_KEY" ]; then key_args=(--public-key "$UCM_PUBLIC_KEY"); fi
          corepack pnpm cli -- validate-ledger \
            --repo . \
            --evidence "$UCM_EVIDENCE" \
            --bindings "$UCM_BINDINGS" \
            --base-ref origin/${{ github.event.repository.default_branch }} \
            "${key_args[@]}" \
            --json

  scan:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Node, then Corepack (puts pnpm on PATH), then setup-node again with
      # cache -- `cache: pnpm` invokes pnpm to find the store, so pnpm must
      # exist before the cache step runs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      # Feature: blocks INVALID only. Release: also blocks required rows that are
      # not FRESH. --ci makes scan print the inferred Swift spans (spec 10.2).
      - name: scan (${{ needs.policy.outputs.mode }})
        run: |
          key_args=()
          if [ -f "$UCM_PUBLIC_KEY" ]; then key_args=(--public-key "$UCM_PUBLIC_KEY"); fi
          corepack pnpm cli -- scan \
            --repo . \
            --product-root . \
            --evidence "$UCM_EVIDENCE" \
            --bindings "$UCM_BINDINGS" \
            --policy-mode "${{ needs.policy.outputs.mode }}" \
            "${key_args[@]}" \
            --ci \
            --json

  prove:
    needs: [policy, validate-ledger, scan]
    # Optional: only the release policy mints signed proof events, and only when a
    # signing key secret is configured. Never runs on feature branches.
    if: needs.policy.outputs.mode == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialise prove runs per ref: the persist step below pushes the ledger back,
    # so two concurrent release runs must not race the same branch tip.
    concurrency:
      group: use-cases-ledger-${{ github.ref }}
      cancel-in-progress: false
    # Hoisted to job scope so the prove step's `if:` can read it -- a step
    # cannot see env defined in its own `env:` block from its own `if:`. With
    # the secret unset this is empty, so the prove step is skipped (degrades
    # gracefully) rather than failing; the rest of the job still succeeds.
    env:
      UCM_CI_SIGNING_KEY: ${{ secrets.UCM_CI_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Node, then Corepack (puts pnpm on PATH), then setup-node again with
      # cache -- `cache: pnpm` invokes pnpm to find the store, so pnpm must
      # exist before the cache step runs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      # Phase 1 -- VERIFY: run each bound row's resolved verifier(s) and write an
      # UNSIGNED results ledger (one JSONL line per row). This step runs arbitrary
      # repo test commands, so for key hygiene the verifier subprocesses MUST NOT
      # inherit the signing key. We strip it IN-SCRIPT (unset) rather than via a
      # step-level `env: UCM_CI_SIGNING_KEY: ""` override, because a step's own env
      # IS visible to its own `if:` (verified empirically: the override made this
      # step's gate false and skipped it). Exits nonzero (failing the job) if any
      # targeted row's verifier fails.
      - name: verify use-case rows
        if: ${{ env.UCM_CI_SIGNING_KEY != '' }}
        run: |
          # Drop the signing key so the spawned verifier processes never see it.
          unset UCM_CI_SIGNING_KEY
          key_args=()
          if [ -f "$UCM_PUBLIC_KEY" ]; then key_args=(--public-key "$UCM_PUBLIC_KEY"); fi
          corepack pnpm cli -- verify \
            --repo . \
            --product-root . \
            --evidence "$UCM_EVIDENCE" \
            --bindings "$UCM_BINDINGS" \
            "${key_args[@]}" \
            --all \
            --out "$UCM_VERIFICATION_RESULTS" \
            --json
      # Phase 2 -- PROVE: consume the unsigned results and mint a SIGNED proof for
      # every passing row. This step runs NO scripts -- it only recomputes hashes
      # and signs -- so it is the ONLY place the trusted CI signing key (held only
      # in the secret) is in scope. The key never leaves CI; agents cannot
      # manufacture green because prove re-derives every hash itself.
      - name: prove use-case rows
        if: ${{ env.UCM_CI_SIGNING_KEY != '' }}
        run: |
          key_args=()
          if [ -f "$UCM_PUBLIC_KEY" ]; then key_args=(--public-key "$UCM_PUBLIC_KEY"); fi
          corepack pnpm cli -- prove \
            --repo . \
            --product-root . \
            --evidence "$UCM_EVIDENCE" \
            --bindings "$UCM_BINDINGS" \
            "${key_args[@]}" \
            --all \
            --trusted-ci \
            --append \
            --verification-results "$UCM_VERIFICATION_RESULTS" \
            --signing-key-env UCM_CI_SIGNING_KEY \
            --json
      # Persist the freshly minted proof events back to the repo. Without this the
      # signed proof dies with the runner and rows never reach FRESH (spec 10.2:
      # CI is the authority, and its authority has to be durable). The ledger is
      # append-only, so this is a pure append; [skip ci] avoids re-triggering.
      - name: persist proof ledger
        if: ${{ env.UCM_CI_SIGNING_KEY != '' }}
        run: |
          if ! git status --porcelain "$UCM_EVIDENCE" | grep -q .; then
            echo "no new proof events to persist"
            exit 0
          fi
          git config user.name "use-cases-ci[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$UCM_EVIDENCE"
          git commit -m "ci: persist use-case proof ledger [skip ci]"
          # Rebase onto the latest tip in case the branch advanced, then push the
          # append back to the same branch the release run is on.
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
