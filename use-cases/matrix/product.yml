schema_version: 1
feature:
  id: matrix.product
  name: Product use-case matrix
  summary: Human-readable behavior inventory for product planning, acceptance, and showcase selection.
use_cases:
  - id: matrix.product.product_inventory
    title: Living product behavior inventory
    lifecycle: active
    value_tier: critical
    journey_role: golden
    usage_frequency: common
    tags:
      - matrix
      - product-behavior
      - dogfood
    source_refs:
      - kind: file
        path: docs/data-model.md
      - kind: file
        path: packages/core/src/useCases/loadUseCaseMatrix.ts
    actor: agent
    intent: Represent Use Cases Plugin product behavior as stable, addressable use-case rows.
    preconditions:
      - Product behavior has been identified at feature level.
    trigger: Agent or user needs acceptance, proof, or demo coverage for the product.
    scenarios:
      - id: matrix.product.product_inventory.cli
        kind: steps
        steps:
          - Run matrix list.
          - Confirm product-level use-cases-plugin rows exist alongside primitive support rows.
          - Confirm each row has value, journey, usage, and scenario data.
    observable_outcomes:
      - Product behavior can be selected by row ID without reading implementation code.
      - Primitive rows remain available as supporting proof rather than the whole product map.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: matrix.product.sharded_human_readable_files
    title: Sharded readable feature files
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags:
      - matrix
      - yaml
      - maintainability
    source_refs:
      - kind: file
        path: docs/data-model.md
      - kind: file
        path: schemas/v1/use-case-file.schema.json
    actor: agent
    intent: Keep rows in readable feature-area YAML files under use-cases.
    preconditions:
      - A workspace has a `use-cases/` directory.
    trigger: Agent adds, updates, reviews, or repairs use-case rows.
    scenarios:
      - id: matrix.product.sharded_human_readable_files.layout
        kind: steps
        steps:
          - Place related rows in a feature shard.
          - Keep one feature summary per file.
          - Validate all shards as one matrix.
    observable_outcomes:
      - Users can inspect or edit a feature shard without opening one large matrix file.
      - Validation reports each loaded or damaged file separately.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: matrix.product.integrity_degraded_nonfatal
    title: Degraded-but-nonfatal diagnostics
    lifecycle: active
    value_tier: critical
    journey_role: edge
    usage_frequency: occasional
    tags:
      - matrix
      - diagnostics
      - partial
    source_refs:
      - kind: file
        path: packages/core/src/useCases/loadUseCaseMatrix.ts
      - kind: file
        path: packages/core/src/useCases/integrity.ts
    actor: agent
    intent: Load valid rows despite damaged files while clearly blocking full coverage or sign-off when relevant.
    preconditions:
      - At least one use-case YAML file is damaged, duplicated, or partially invalid.
    trigger: Validation, planning, or status reads a partially damaged matrix.
    scenarios:
      - id: matrix.product.integrity_degraded_nonfatal.partial
        kind: steps
        steps:
          - Validate a workspace with one valid shard and one damaged shard.
          - Confirm valid rows are still addressable.
          - Confirm integrity is partial and diagnostics identify the damaged file.
    observable_outcomes:
      - Damaged YAML does not bring down the whole system.
      - Plans and status outputs surface partial integrity before any final claim.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/use-cases/integrity_degraded_nonfatal.test.ts
          inputs:
            - tests/use-cases/integrity_degraded_nonfatal.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
      required_for_release: true
  - id: matrix.product.coverage_by_value_and_journey
    title: Coverage by value and journey role
    lifecycle: active
    value_tier: core
    journey_role: alternate
    usage_frequency: occasional
    tags:
      - matrix
      - coverage
      - prioritization
    source_refs:
      - kind: file
        path: packages/core/src/useCases/query.ts
      - kind: file
        path: packages/core/src/presentation/scoring.ts
    actor: agent
    intent: Let agents select and report rows by value tier, journey role, lifecycle, tags, and host relevance.
    preconditions:
      - Rows are tagged with value, journey, usage, lifecycle, and host applicability.
    trigger: Agent prepares a showcase, walkthrough, acceptance pass, or gap report.
    scenarios:
      - id: matrix.product.coverage_by_value_and_journey.selection
        kind: steps
        steps:
          - List rows by value and journey metadata.
          - Select critical golden rows for a short showcase.
          - Include alternate, edge, negative, and failure rows for deeper walkthrough coverage.
    observable_outcomes:
      - High-value rows are easy to separate from long-tail or future rows.
      - Showcase and walkthrough cuts can explain why rows were included or excluded.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/use-cases/coverage_by_value_and_journey.test.ts
          inputs:
            - tests/use-cases/coverage_by_value_and_journey.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: matrix.product.claim_guardrails
    title: Unsupported-claim guardrails
    lifecycle: active
    value_tier: critical
    journey_role: negative
    usage_frequency: common
    tags:
      - matrix
      - claims
      - safety
    source_refs:
      - kind: file
        path: docs/security.md
      - kind: file
        path: .agents/skills/showcase/SKILL.md
    actor: agent
    intent: Prevent verified, supported, signed-off, or release-ready claims when evidence or approval is missing.
    preconditions:
      - A row, plan, host profile, capsule, or generated output could be mistaken for proof.
    trigger: Agent summarizes readiness, support, approval, or release status.
    scenarios:
      - id: matrix.product.claim_guardrails.negative
        kind: steps
        steps:
          - Inspect the matrix and related evidence status.
          - Identify rows with missing proof or approval.
          - State the exact gap instead of claiming acceptance.
    observable_outcomes:
      - Prepared material is not described as performed proof.
      - Host support and user sign-off claims require recorded evidence.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: agent_observation
          required_verifiers:
            - agent
          minimum_count: 1
    approval_policy:
      mode: none
  - id: matrix.product.status_summary
    title: One-shot matrix and evidence health summary
    lifecycle: active
    value_tier: supporting
    journey_role: alternate
    usage_frequency: occasional
    tags:
      - matrix
      - status
      - summary
    source_refs:
      - kind: file
        path: packages/core/src/useCases/query.ts
      - kind: file
        path: docs/cli.md
    actor: agent
    intent: Summarize matrix population, integrity state, and linked evidence status in a single read-only command for a quick health check.
    preconditions:
      - A use-case matrix exists, possibly with partial or missing evidence.
    trigger: Agent wants a fast readiness read before planning, release, or showcase.
    scenarios:
      - id: matrix.product.status_summary.report
        kind: steps
        steps:
          - Run matrix status.
          - Inspect row counts, integrity state, and evidence coverage.
          - Confirm the summary is derived from current files, not a cached claim.
    observable_outcomes:
      - Matrix and evidence health are readable in one command.
      - Integrity or evidence gaps are visible without a full plan run.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
