schema_version: 1
feature:
  id: release.package
  name: Installable package
  summary: Release checks inspect real tarballs and installed package roots.
use_cases:
  - id: release.package.installable_artifact
    title: Verify the root package tarball and installed runtime
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: occasional
    tags:
      - release
      - package
      - doctor
    source_refs:
      - kind: file
        path: packages/core/src/package/inspectPackage.ts
    actor: agent
    intent: Prove the distributable artifact is installable and free of local state.
    preconditions:
      - The workspace has been built.
    trigger: Agent prepares release or merge evidence.
    scenarios:
      - id: release.package.installable_artifact.cli
        kind: steps
        steps:
          - Pack the root package to a tarball.
          - Inspect tarball entries for required assets and forbidden state.
          - Install the tarball into a clean project.
          - Run installed CLI and MCP smoke checks.
    observable_outcomes:
      - Package doctor reports a complete tarball or installed-root inspection with no diagnostics.
      - The release claim points at the artifact users will install, and package contents match documented and manifest claims.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: none
    approval_policy:
      mode: none
  - id: release.ci_gate.sequential
    title: Run the sequential production release gate
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: occasional
    tags:
      - release
      - ci
      - gate
      - package
    source_refs:
      - kind: file
        path: scripts/release-gate.mjs
      - kind: file
        path: .github/workflows/ci.yml
    actor: agent
    intent: Use one sequential command as the production release gate so build artifacts cannot race tests.
    preconditions:
      - Dependencies are installed from the lockfile and Node 22 or newer is available.
    trigger: Agent prepares a v1 release, PR, or merge gate.
    scenarios:
      - id: release.ci_gate.sequential.local
        kind: steps
        steps:
          - Run node scripts/release-gate.mjs from the repository root.
          - Confirm install, typecheck, build, test, package doctor, matrix validation, matrix list, and pack run in order.
          - Stop on the first failing command.
    observable_outcomes:
      - The command prints release gate passed only after all sequential checks exit zero.
      - The gate proves frozen install, typecheck, build, full tests, package doctor, and matrix checks in one deterministic sequence.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: none
    approval_policy:
      mode: none
