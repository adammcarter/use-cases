schema_version: 1
feature:
  id: hosts.profiles
  name: Host profiles and conformance
  summary: First-class host families with truthful projection, activation, and support status.
use_cases:
  - id: hosts.profiles.first_class_profile_set
    title: Four first-class host families
    lifecycle: active
    value_tier: critical
    journey_role: golden
    usage_frequency: common
    tags:
      - hosts
      - claude
      - codex
      - copilot
      - opencode
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: hosts/claude.yml
      - kind: file
        path: hosts/codex.yml
      - kind: file
        path: hosts/copilot.yml
      - kind: file
        path: hosts/opencode.yml
    actor: agent
    intent: Maintain Claude, Codex, Copilot, and OpenCode as explicit host families with profiles.
    preconditions:
      - Host profile files are part of the package and docs.
    trigger: Agent checks host support shape or release packaging.
    scenarios:
      - id: hosts.profiles.first_class_profile_set.profiles
        kind: steps
        steps:
          - Inspect the host profile set.
          - Confirm Claude, Codex, Copilot, and OpenCode are represented.
          - Keep host profiles separate from live support proof.
    observable_outcomes:
      - Each first-class host family has a profile target.
      - Profile existence is not described as live host support.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
        notes: Profile target only; live support proof is separate.
      - host_surface: copilot.cli
        supported: true
        notes: Profile target only; live support proof is separate.
      - host_surface: opencode.cli
        supported: true
        notes: Profile target only; live support proof is separate.
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: hosts.profiles.projection_checksum_integrity
    title: Canonical skill projection integrity
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags:
      - hosts
      - projection
      - checksum
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: packages/core/src/hosts/projectHostFiles.ts
    actor: script
    intent: Project host files from canonical skills and detect drift with source hashes.
    preconditions:
      - Canonical agent skills exist in `.agents/skills`.
    trigger: Host projection or conformance status is generated.
    scenarios:
      - id: hosts.profiles.projection_checksum_integrity.check
        kind: steps
        steps:
          - Project host files from canonical skill sources.
          - Compare recorded source hashes with current canonical files.
          - Report drift instead of silently accepting stale projections.
    observable_outcomes:
      - Host projection files can be checked against canonical skill content.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: hosts.profiles.live_activation_caveat
    title: Static projection is not live support
    lifecycle: active
    value_tier: critical
    journey_role: edge
    usage_frequency: occasional
    tags:
      - hosts
      - claim-boundary
      - support
    source_refs:
      - kind: file
        path: docs/activation.md
      - kind: file
        path: docs/hosts.md
    actor: agent
    intent: Make Copilot and OpenCode static conformance caveats visible when live executables are unavailable.
    preconditions:
      - A host profile or projection exists without live host execution evidence.
    trigger: Agent summarizes host support or release status.
    scenarios:
      - id: hosts.profiles.live_activation_caveat.claim
        kind: steps
        steps:
          - Inspect host conformance evidence.
          - Identify static-only or not_run hosts.
          - State caveats before claiming support.
    observable_outcomes:
      - Static projections are not inflated into live host support claims.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
        notes: Caveat row applies when live executable proof is missing.
      - host_surface: opencode.cli
        supported: true
        notes: Caveat row applies when live executable proof is missing.
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: agent_observation
          required_verifiers:
            - agent
          minimum_count: 1
    approval_policy:
      mode: none
  - id: hosts.profiles.bootstrap_visibility
    title: Trusted bootstrap visibility
    lifecycle: active
    value_tier: core
    journey_role: alternate
    usage_frequency: occasional
    tags:
      - hosts
      - bootstrap
      - activation
    source_refs:
      - kind: file
        path: docs/activation.md
      - kind: file
        path: bootstrap/use-cases-plugin.md
      - kind: file
        path: packages/core/src/skills/validateSkillAssets.ts
    actor: script
    intent: Check whether the trusted bootstrap is present or visible through each host projection path.
    preconditions:
      - Host projection or skill package assets exist.
    trigger: Agent verifies activation-critical instructions for a host.
    scenarios:
      - id: hosts.profiles.bootstrap_visibility.check
        kind: steps
        steps:
          - Validate skill assets.
          - Confirm bootstrap content is packaged or referenced through expected host paths.
          - Report missing bootstrap visibility as a conformance gap.
    observable_outcomes:
      - Future agents can discover when to use the plugin skills.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: hosts.profiles.surface_limitations
    title: Host limitations are explicit
    lifecycle: active
    value_tier: supporting
    journey_role: alternate
    usage_frequency: occasional
    tags:
      - hosts
      - limitations
      - permissions
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: hosts/copilot.yml
      - kind: file
        path: hosts/opencode.yml
    actor: agent
    intent: Show known host limitations, permissions, and unavailable capabilities without hiding gaps.
    preconditions:
      - A host has missing executable proof, limited projection support, or different tool semantics.
    trigger: Agent chooses a host workflow or reports host readiness.
    scenarios:
      - id: hosts.profiles.surface_limitations.report
        kind: steps
        steps:
          - Inspect host profile and conformance status.
          - Report unavailable commands, unknown activation paths, or untested surfaces.
          - Avoid blanket support claims.
    observable_outcomes:
      - Host-specific limitations are visible before users rely on them.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: agent_observation
          required_verifiers:
            - agent
          minimum_count: 1
    approval_policy:
      mode: none
  - id: hosts.profiles.smoke_signal_resilience
    title: Signal-killed host smoke is not_run, never passed
    lifecycle: active
    value_tier: core
    journey_role: failure
    usage_frequency: rare
    tags:
      - hosts
      - conformance
      - resilience
    source_refs:
      - kind: file
        path: packages/core/src/hosts/conformanceStatus.ts
      - kind: file
        path: tests/conformance/hosts/p13-host-conformance.test.ts
    actor: script
    intent: When a host smoke executable is terminated by a signal or exits without a status, report it as warning-backed not_run rather than counting it as passed.
    preconditions:
      - A host smoke command is available but is killed by a signal or returns no exit status.
    trigger: Release gate or agent runs host conformance and a smoke executable is terminated abnormally.
    scenarios:
      - id: hosts.profiles.smoke_signal_resilience.terminated
        kind: steps
        steps:
          - Run host conformance with a smoke executable that is terminated by a signal.
          - Confirm the host is reported as not_run with an executable-unavailable reason.
          - Confirm the abnormal termination is not counted as a passed conformance result.
    observable_outcomes:
      - A signal-killed smoke run is treated as inconclusive, not as proof of support.
      - The reason for the not_run status is visible to the reviewer.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: hosts.profiles.bootstrap_autoinject
    title: Trusted bootstrap is auto-injected at session start per host
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags:
      - hosts
      - bootstrap
      - activation
    source_refs:
      - kind: file
        path: hooks/session-start
      - kind: file
        path: hooks/hooks.json
      - kind: file
        path: hooks/hooks-codex.json
      - kind: file
        path: .opencode/plugin/use-cases-plugin.js
      - kind: file
        path: bootstrap/use-cases-plugin.md
    actor: agent
    intent: Deliver the trusted bootstrap into an installed agent's context at session start through each host's real mechanism, so the plugin activates without the agent having to discover it by reading the repo.
    preconditions:
      - The plugin is installed in a supported host and the host fires its session-start lifecycle.
    trigger: A session starts (or resumes / clears / compacts) in a host with the plugin installed.
    scenarios:
      - id: hosts.profiles.bootstrap_autoinject.per_host
        kind: steps
        steps:
          - Run the session-start hook under each host's environment (Claude, Copilot, Codex).
          - Confirm it emits the trusted bootstrap in that host's context shape.
          - Confirm the OpenCode plugin returns the bootstrap as session.started context.
    observable_outcomes:
      - Claude and Codex receive the bootstrap as hookSpecificOutput.additionalContext; Copilot as top-level additionalContext; OpenCode as session.started context.
      - The injected content is the trusted EXTREMELY_IMPORTANT bootstrap block, delivered whole (no truncation), not arbitrary text.
    host_applicability:
      - host_surface: claude.cli
        supported: true
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/conformance/bootstrap/session-start.test.ts
          inputs:
            - tests/conformance/bootstrap/session-start.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
