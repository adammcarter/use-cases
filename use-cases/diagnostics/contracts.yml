schema_version: 1
feature:
  id: diagnostics.contracts
  name: Diagnostics and contracts
  summary: Resolve roots deterministically and publish a versioned, validatable schema contract so the tool can be pointed anywhere and integrated against safely.
use_cases:
  - id: diagnostics.contracts.root_resolution
    title: Workspace and data roots resolve safely
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: occasional
    tags:
      - diagnostics
      - roots
      - configuration
    source_refs:
      - kind: file
        path: packages/core/src/roots.ts
      - kind: file
        path: docs/data-model.md
    actor: agent
    intent: Resolve the workspace root and data root deterministically, allowing the data root to differ from the workspace root for monorepo or CI layouts.
    preconditions:
      - A workspace config declares a data root that may differ from the repository root.
    trigger: Agent points the CLI or MCP server at a repository and inspects resolved roots.
    scenarios:
      - id: diagnostics.contracts.root_resolution.doctor
        kind: steps
        steps:
          - Run doctor roots against the repository.
          - Confirm workspace root and data root are reported distinctly.
          - Confirm a separated data root resolves and unsafe or symlinked roots are rejected.
    observable_outcomes:
      - The data root can be relocated without breaking matrix, evidence, or showcase paths.
      - Unsafe roots are refused rather than silently followed.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: diagnostics.contracts.schema_contract_surface
    title: Versioned schema contract is published and validated
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: occasional
    tags:
      - diagnostics
      - schema
      - contract
    source_refs:
      - kind: file
        path: packages/core/src/schema/index.ts
      - kind: file
        path: schemas/v1/cli-result.schema.json
      - kind: file
        path: docs/cli.md
    actor: script
    intent: Expose every result envelope as a listable, versioned JSON schema and validate fixtures against it so integrators can depend on the contract.
    preconditions:
      - The package ships versioned v1 result and entity schemas.
    trigger: Integrator or release gate enumerates the contract and validates fixtures.
    scenarios:
      - id: diagnostics.contracts.schema_contract_surface.validate
        kind: steps
        steps:
          - Run schema list to enumerate published v1 schemas.
          - Run schema validate-fixtures against the bundled fixtures.
          - Confirm CLI and MCP results validate against their declared schema IDs.
    observable_outcomes:
      - Every command result is backed by a published, versioned schema.
      - A drifted result or fixture fails validation rather than passing silently.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: diagnostics.contracts.identity_consistency
    title: Product identity is consistent across every envelope
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags:
      - diagnostics
      - identity
      - contract
    source_refs:
      - kind: file
        path: packages/core/src/version.ts
      - kind: file
        path: use-cases.yml
    actor: agent
    intent: Emit the configured component identity (use-cases) in every CLI and MCP result envelope, falling back to the same default when no workspace config is present, so a published build never leaks a stale product name.
    preconditions:
      - The workspace config declares a component id, or none is set and the default applies.
    trigger: Any CLI or MCP command runs and returns a result envelope.
    scenarios:
      - id: diagnostics.contracts.identity_consistency.envelope
        kind: steps
        steps:
          - Run any command with --json and read context.component_id.
          - Confirm it equals the configured component id, or the use-cases default when unconfigured.
          - Confirm no envelope, schema default, or version surface reports the pre-rename name.
    observable_outcomes:
      - Every envelope reports component_id use-cases for this repository.
      - An unconfigured workspace still defaults to use-cases rather than a stale name.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: diagnostics.contracts.cli_self_documents
    title: CLI is self-documenting via help and usage
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags:
      - diagnostics
      - cli
      - discoverability
    source_refs:
      - kind: file
        path: packages/cli/src/index.ts
      - kind: file
        path: docs/cli.md
    actor: agent
    intent: Let an agent discover the available commands and their flags from the CLI itself, without reading the source or the test suite.
    preconditions:
      - The CLI is built and on PATH (or invoked via node).
    trigger: An agent reaches for help before it knows a command's exact arguments.
    scenarios:
      - id: diagnostics.contracts.cli_self_documents.usage
        kind: steps
        steps:
          - Run the CLI with no command, with --help, or with -h.
          - Run a known command with --help.
          - Run an unrecognized command.
    observable_outcomes:
      - A bare invocation, --help, or -h prints a usage envelope listing the available commands and their flags.
      - An unrecognized command prints usage scoped to its group instead of a bare command.unknown response.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/conformance/cli/cli-ergonomics.test.ts
          inputs:
            - tests/conformance/cli/cli-ergonomics.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: diagnostics.contracts.missing_build_hint
    title: Missing build surfaces an actionable hint
    lifecycle: active
    value_tier: supporting
    journey_role: edge
    usage_frequency: occasional
    tags:
      - diagnostics
      - cli
      - onboarding
    source_refs:
      - kind: file
        path: packages/cli/src/index.ts
    actor: agent
    intent: On a fresh clone where the compiled core has not been built, tell the user to run the build instead of surfacing a raw module-resolution error.
    preconditions:
      - The compiled core dist has not been built yet.
    trigger: An agent invokes the CLI before running the build.
    scenarios:
      - id: diagnostics.contracts.missing_build_hint.hint
        kind: steps
        steps:
          - Invoke the CLI with the compiled core absent.
          - Read the message and exit code.
    observable_outcomes:
      - The CLI prints an actionable message naming the build command rather than a raw module-not-found stack.
      - The process exits non-zero so the missing build is not mistaken for success.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/conformance/cli/cli-ergonomics.test.ts
          inputs:
            - tests/conformance/cli/cli-ergonomics.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
