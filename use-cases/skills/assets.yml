schema_version: 1
feature:
  id: skills.assets
  name: Skill assets
  summary: Ship and validate the agent skill assets (showcase, walkthrough, use-case matrix) so hosts can discover and run them without silent breakage.
use_cases:
  - id: skills.assets.asset_validation
    title: Shipped skill assets validate
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: occasional
    tags:
      - skills
      - doctor
      - assets
    source_refs:
      - kind: file
        path: packages/core/src/skills/validateSkillAssets.ts
      - kind: file
        path: .agents/skills/use-cases/SKILL.md
      - kind: file
        path: docs/activation.md
    actor: script
    intent: Confirm the shipped showcase, walkthrough, and use-cases skills have required files and well-formed front-matter.
    preconditions:
      - The plugin ships one or more agent skill directories under .agents/skills.
    trigger: Agent or release gate runs doctor skills before publishing or activating a host.
    scenarios:
      - id: skills.assets.asset_validation.doctor
        kind: steps
        steps:
          - Run doctor skills.
          - Inspect each discovered skill name, required asset, and front-matter.
          - Confirm every shipped skill reports as valid.
    observable_outcomes:
      - Each shipped skill is discovered with a stable name and intact assets.
      - A skill cannot be published while its required files are missing.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: skills.assets.degraded_assets
    title: Damaged skill assets surface as diagnostics
    lifecycle: active
    value_tier: supporting
    journey_role: edge
    usage_frequency: rare
    tags:
      - skills
      - doctor
      - diagnostics
    source_refs:
      - kind: file
        path: packages/core/src/skills/validateSkillAssets.ts
      - kind: file
        path: tests/skills/p7-skills.test.ts
    actor: script
    intent: Report missing or malformed skill files as diagnostics instead of silently passing them as healthy.
    preconditions:
      - A skill directory is missing a required file or carries malformed front-matter.
    trigger: Agent runs doctor skills against a damaged or incomplete skill set.
    scenarios:
      - id: skills.assets.degraded_assets.report
        kind: steps
        steps:
          - Run doctor skills against a skill missing required assets.
          - Confirm the damaged skill is reported with a diagnostic.
          - Confirm healthy skills remain usable and the run is non-fatal.
    observable_outcomes:
      - Damaged skills are visible rather than silently treated as valid.
      - One damaged skill does not hide the status of the others.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: skills.assets.host_declaration
    title: Shipped skills are declared to the Claude host
    lifecycle: active
    value_tier: critical
    journey_role: golden
    usage_frequency: common
    tags:
      - skills
      - claude
      - activation
    source_refs:
      - kind: file
        path: .claude-plugin/plugin.json
      - kind: file
        path: .claude-plugin/marketplace.json
      - kind: file
        path: tests/skills/p7-skills.test.ts
    actor: agent
    intent: Make the shipped skills reachable by the Claude host, which only auto-scans skills/ at plugin root while ours live in .agents/skills.
    preconditions:
      - The package ships its skills under .agents/skills rather than the host's default skills/ directory.
    trigger: The Claude host reads the plugin manifests while installing or loading the plugin.
    scenarios:
      - id: skills.assets.host_declaration.manifests
        kind: steps
        steps:
          - Read the Claude plugin manifest and confirm it declares ./.agents/skills.
          - Read the marketplace manifest and confirm it offers the use-cases plugin.
          - Confirm the Claude and Codex plugin manifests carry the same version.
    observable_outcomes:
      - The non-default skills directory is declared explicitly, so the host loads skills it would otherwise never scan.
      - A marketplace manifest ships, so the plugin can be installed at all and its plugin manifest is read.
      - The two shipped plugin manifests cannot drift to different versions.
    host_applicability:
      - host_surface: claude.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/skills/p7-skills.test.ts
          inputs:
            - tests/skills/p7-skills.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: skills.assets.demo_gates
    title: Live showcase demos are gated on explicit user answers
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: occasional
    tags:
      - skills
      - showcase
      - approval
    source_refs:
      - kind: file
        path: .agents/skills/showcase/SKILL.md
      - kind: file
        path: tests/skills/p7-skills.test.ts
    actor: agent
    intent: Run a live demo only when the user says they are ready, let them choose who drives, and turn their approve/reject/talk answer into the correct recorded outcome without the user touching commands.
    preconditions:
      - A showcase plan with presentable items exists.
    trigger: An agent prepares to perform a live showcase for the user.
    scenarios:
      - id: skills.assets.demo_gates.gates
        kind: steps
        steps:
          - Send the item's demo card inline (Steps / Expect) as its own message and end the turn, then ask the readiness question with the host question tool in the next turn.
          - Perform exactly the card's steps with the chosen driver and presentation format.
          - Reprint the card with Actual filled, then ask approve / reject / run it again in that order, recording the answer as acceptance, showcase reject, or a re-performance.
    observable_outcomes:
      - No live run starts before an explicit ready answer, and no question is ever asked before its card has been delivered as its own completed message.
      - An approve answer is recorded as the user's acceptance with their notes verbatim; the signed sign-off tier stays a separate opt-in path.
      - A reject answer records the user's notes verbatim; run it again re-performs and re-asks without recording; talking about it records nothing.
    host_applicability:
      - host_surface: claude.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - tests/skills/p7-skills.test.ts
          inputs:
            - tests/skills/p7-skills.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
  - id: skills.assets.unreachable_skills_fail_doctor
    title: Unreachable skills fail doctor instead of passing green
    lifecycle: active
    value_tier: critical
    journey_role: negative
    usage_frequency: occasional
    tags:
      - skills
      - doctor
      - diagnostics
    source_refs:
      - kind: file
        path: packages/core/src/skills/validateSkillAssets.ts
      - kind: file
        path: packages/core/src/skills/types.ts
      - kind: file
        path: packages/core/test/skills/hostRegistration.test.ts
    actor: script
    intent: Answer the question that matters to an agent — can a host actually reach these skills? — instead of only checking that the SKILL.md files exist and parse.
    preconditions:
      - Skill assets are present on disk and structurally valid.
    trigger: Agent or release gate runs doctor skills against a checkout whose host registration is broken.
    scenarios:
      - id: skills.assets.unreachable_skills_fail_doctor.undeclared
        kind: steps
        steps:
          - Remove the skills key from the Claude plugin manifest.
          - Run skill asset validation.
          - Confirm skills.host_not_declared is reported and the result is not complete.
      - id: skills.assets.unreachable_skills_fail_doctor.misdirected
        kind: steps
        steps:
          - Point the manifest skills key at a directory that does not hold the canonical skills.
          - Confirm skills.host_not_declared is still reported.
      - id: skills.assets.unreachable_skills_fail_doctor.uninstallable
        kind: steps
        steps:
          - Remove the marketplace manifest, or list a different plugin in it.
          - Confirm skills.host_not_installable is reported.
      - id: skills.assets.unreachable_skills_fail_doctor.manifest_missing
        kind: steps
        steps:
          - Run validation against a checkout with no Claude plugin manifest.
          - Confirm skills.host_manifest_missing is reported.
    observable_outcomes:
      - Skills that exist on disk but that no host can load are an error, not a pass.
      - The result carries a host_registration field naming the host, its manifest path, and whether the skill root is declared and installable.
      - A manifest that declares a directory not actually holding the canonical skills does not count as declared.
    host_applicability:
      - host_surface: claude.cli
        supported: true
    verification_policy:
      mode: requirements
      verifiers:
        script:
          kind: script
          evidence_kind: test_result
          command:
            - pnpm
            - -s
            - vitest
            - run
            - packages/core/test/skills/hostRegistration.test.ts
          inputs:
            - packages/core/test/skills/hostRegistration.test.ts
      requirements:
        - evidence_kind: test_result
          required_verifiers:
            - script
          minimum_count: 1
    approval_policy:
      mode: none
