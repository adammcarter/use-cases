schema_version: 1
feature:
  id: presentation_skills.hosts
  name: Host profiles and conformance
  summary: First-class host families with truthful projection, activation, and support status.
use_cases:
  - id: presentation_skills.hosts.first_class_profile_set
    title: Four first-class host families
    lifecycle: active
    value_tier: critical
    journey_role: golden
    usage_frequency: common
    tags: [hosts, claude, codex, copilot, opencode]
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: hosts/claude.yml
      - kind: file
        path: hosts/codex.yml
      - kind: file
        path: hosts/copilot.yml
      - kind: file
        path: hosts/opencode.yml
    actor: agent
    intent: Maintain Claude, Codex, Copilot, and OpenCode as explicit host families with profiles.
    preconditions:
      - Host profile files are part of the package and docs.
    trigger: Agent checks host support shape or release packaging.
    scenarios:
      - id: presentation_skills.hosts.first_class_profile_set.profiles
        kind: steps
        steps:
          - Inspect the host profile set.
          - Confirm Claude, Codex, Copilot, and OpenCode are represented.
          - Keep host profiles separate from live support proof.
    observable_outcomes:
      - Each first-class host family has a profile target.
      - Profile existence is not described as live host support.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
        notes: Profile target only; live support proof is separate.
      - host_surface: copilot.cli
        supported: true
        notes: Profile target only; live support proof is separate.
      - host_surface: opencode.cli
        supported: true
        notes: Profile target only; live support proof is separate.
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers: [script]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: presentation_skills.hosts.projection_checksum_integrity
    title: Canonical skill projection integrity
    lifecycle: active
    value_tier: core
    journey_role: golden
    usage_frequency: common
    tags: [hosts, projection, checksum]
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: packages/ucm-core/src/hosts/projectHostFiles.ts
    actor: script
    intent: Project host files from canonical skills and detect drift with source hashes.
    preconditions:
      - Canonical agent skills exist in `.agents/skills`.
    trigger: Host projection or conformance status is generated.
    scenarios:
      - id: presentation_skills.hosts.projection_checksum_integrity.check
        kind: steps
        steps:
          - Project host files from canonical skill sources.
          - Compare recorded source hashes with current canonical files.
          - Report drift instead of silently accepting stale projections.
    observable_outcomes:
      - Host projection files can be checked against canonical skill content.
    host_applicability:
      - host_surface: codex.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers: [script]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: presentation_skills.hosts.conformance_status_truth
    title: Truthful host conformance status
    lifecycle: active
    value_tier: critical
    journey_role: golden
    usage_frequency: common
    tags: [hosts, conformance, evidence]
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: packages/ucm-core/src/hosts/conformanceStatus.ts
    actor: script
    intent: Report passed, failed, and not_run distinctly, with no verified support claim without evidence IDs.
    preconditions:
      - Host conformance data or unavailable-host observations exist.
    trigger: Agent or release gate reports host support status.
    scenarios:
      - id: presentation_skills.hosts.conformance_status_truth.status
        kind: steps
        steps:
          - Run host conformance status.
          - Inspect passed, failed, and not_run entries.
          - Confirm support claims are backed by evidence IDs or caveated as unverified.
    observable_outcomes:
      - Missing Copilot or OpenCode executables are reported as not_run rather than passed.
      - Host docs and release claims match recorded evidence.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: host_conformance
          required_verifiers: [script]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: presentation_skills.hosts.live_activation_caveat
    title: Static projection is not live support
    lifecycle: active
    value_tier: critical
    journey_role: edge
    usage_frequency: occasional
    tags: [hosts, claim-boundary, support]
    source_refs:
      - kind: file
        path: docs/activation.md
      - kind: file
        path: docs/hosts.md
    actor: agent
    intent: Make Copilot and OpenCode static conformance caveats visible when live executables are unavailable.
    preconditions:
      - A host profile or projection exists without live host execution evidence.
    trigger: Agent summarizes host support or release status.
    scenarios:
      - id: presentation_skills.hosts.live_activation_caveat.claim
        kind: steps
        steps:
          - Inspect host conformance evidence.
          - Identify static-only or not_run hosts.
          - State caveats before claiming support.
    observable_outcomes:
      - Static projections are not inflated into live host support claims.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
        notes: Caveat row applies when live executable proof is missing.
      - host_surface: opencode.cli
        supported: true
        notes: Caveat row applies when live executable proof is missing.
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: agent_observation
          required_verifiers: [agent]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: presentation_skills.hosts.bootstrap_visibility
    title: Trusted bootstrap visibility
    lifecycle: active
    value_tier: core
    journey_role: alternate
    usage_frequency: occasional
    tags: [hosts, bootstrap, activation]
    source_refs:
      - kind: file
        path: docs/activation.md
      - kind: file
        path: bootstrap/presentation-skills.md
      - kind: file
        path: packages/ucm-core/src/skills/validateSkillAssets.ts
    actor: script
    intent: Check whether the trusted bootstrap is present or visible through each host projection path.
    preconditions:
      - Host projection or skill package assets exist.
    trigger: Agent verifies activation-critical instructions for a host.
    scenarios:
      - id: presentation_skills.hosts.bootstrap_visibility.check
        kind: steps
        steps:
          - Validate skill assets.
          - Confirm bootstrap content is packaged or referenced through expected host paths.
          - Report missing bootstrap visibility as a conformance gap.
    observable_outcomes:
      - Future agents can discover when to use the plugin skills.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: command_result
          required_verifiers: [script]
          minimum_count: 1
    approval_policy:
      mode: none

  - id: presentation_skills.hosts.surface_limitations
    title: Host limitations are explicit
    lifecycle: active
    value_tier: supporting
    journey_role: alternate
    usage_frequency: occasional
    tags: [hosts, limitations, permissions]
    source_refs:
      - kind: file
        path: docs/hosts.md
      - kind: file
        path: hosts/copilot.yml
      - kind: file
        path: hosts/opencode.yml
    actor: agent
    intent: Show known host limitations, permissions, and unavailable capabilities without hiding gaps.
    preconditions:
      - A host has missing executable proof, limited projection support, or different tool semantics.
    trigger: Agent chooses a host workflow or reports host readiness.
    scenarios:
      - id: presentation_skills.hosts.surface_limitations.report
        kind: steps
        steps:
          - Inspect host profile and conformance status.
          - Report unavailable commands, unknown activation paths, or untested surfaces.
          - Avoid blanket support claims.
    observable_outcomes:
      - Host-specific limitations are visible before users rely on them.
    host_applicability:
      - host_surface: codex.cli
        supported: true
      - host_surface: claude.cli
        supported: true
      - host_surface: copilot.cli
        supported: true
      - host_surface: opencode.cli
        supported: true
    verification_policy:
      mode: requirements
      requirements:
        - evidence_kind: agent_observation
          required_verifiers: [agent]
          minimum_count: 1
    approval_policy:
      mode: none
